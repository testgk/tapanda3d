name: Sync from GitLab

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push changes to the repository
    
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Inject GitLab credentials via URL rewrite so the token never appears
          # in remote URLs or git command output.
          # GITLAB_TOKEN must be a GitLab Personal Access Token (Settings →
          # Access Tokens → read_repository scope). This is required even when
          # you sign in to GitLab using your GitHub account (GitHub OAuth).
          if [ -n "${GITLAB_TOKEN}" ]; then
            git config --global url."https://oauth2:${GITLAB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
          fi
      
      - name: Add GitLab remote
        run: |
          # Check if remote already exists
          if git remote get-url gitlab >/dev/null 2>&1; then
            echo "GitLab remote already exists, updating URL..."
            git remote set-url gitlab https://gitlab.com/testgk/tapanda3d.git
          else
            echo "Adding GitLab remote..."
            git remote add gitlab https://gitlab.com/testgk/tapanda3d.git
          fi
      
      - name: Verify GitLab token and repository access
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          # --- 1. Check whether the secret is populated at all ---
          if [ -z "${GITLAB_TOKEN}" ]; then
            echo "::error::GITLAB_TOKEN secret is not set."
            echo ""
            echo "Fix: Go to Settings → Secrets and variables → Actions → New repository secret"
            echo "     Name:  GITLAB_TOKEN"
            echo "     Value: your GitLab Personal Access Token (read_repository scope)"
            exit 1
          fi

          echo "GITLAB_TOKEN secret is present. Verifying access to the GitLab repository..."

          # --- 2. Call the GitLab Projects API to check token validity and repo access ---
          HTTP_STATUS=$(curl -s -o /tmp/gitlab_api_response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITLAB_TOKEN}" \
            "https://gitlab.com/api/v4/projects/testgk%2Ftapanda3d")

          case "$HTTP_STATUS" in
            200)
              echo "Token is valid and has access to the repository. Proceeding with fetch."
              ;;
            401)
              echo "::error::GitLab returned 401 Unauthorized."
              echo ""
              echo "Your GITLAB_TOKEN is invalid or expired."
              echo "Fix:"
              echo "  1. On GitLab go to: Edit profile → Access Tokens → Add new token"
              echo "  2. Enable the 'read_repository' scope and set a future expiry date."
              echo "  3. Copy the token and update the GITLAB_TOKEN secret in this repository:"
              echo "     Settings → Secrets and variables → Actions → GITLAB_TOKEN → Update secret"
              cat /tmp/gitlab_api_response.json || true
              exit 1
              ;;
            403)
              echo "::error::GitLab returned 403 Forbidden."
              echo ""
              echo "Your token is valid but does not have permission to read this repository."
              echo "Fix: Recreate the token and make sure the 'read_repository' scope is checked."
              cat /tmp/gitlab_api_response.json || true
              exit 1
              ;;
            404)
              echo "::error::GitLab returned 404 Not Found."
              echo ""
              echo "Either the repository 'testgk/tapanda3d' does not exist on GitLab,"
              echo "or your token does not have 'read_repository' scope for this project."
              echo ""
              echo "Fix:"
              echo "  - Confirm the repository exists at https://gitlab.com/testgk/tapanda3d"
              echo "  - Make sure the token's owner has at least Reporter access to the project."
              echo "  - Make sure the token includes the 'read_repository' scope."
              cat /tmp/gitlab_api_response.json || true
              exit 1
              ;;
            *)
              # Handle transient errors (rate-limit, server error) as warnings so the
              # fetch can still succeed; fail clearly on any other unexpected code.
              if [ "$HTTP_STATUS" = "429" ]; then
                echo "::warning::GitLab API rate limit hit (429). Proceeding anyway."
              elif [ "${HTTP_STATUS#5}" != "$HTTP_STATUS" ]; then
                # HTTP 5xx — GitLab server error, transient
                echo "::warning::GitLab API returned server error ${HTTP_STATUS}. Proceeding anyway."
              else
                echo "::error::Unexpected HTTP status ${HTTP_STATUS} from GitLab API."
                cat /tmp/gitlab_api_response.json || true
                exit 1
              fi
              cat /tmp/gitlab_api_response.json || true
              ;;
          esac

      - name: Fetch from GitLab
        run: |
          echo "Fetching from GitLab repository..."
          git fetch gitlab --prune
      
      - name: Detect GitLab default branch
        id: detect-branch
        run: |
          # Try to get the default branch name from GitLab using symbolic-ref
          GITLAB_DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/gitlab/HEAD 2>/dev/null | sed 's@^refs/remotes/gitlab/@@' || echo "")
          
          # Fallback to git ls-remote if symbolic-ref fails
          if [ -z "$GITLAB_DEFAULT_BRANCH" ]; then
            GITLAB_DEFAULT_BRANCH=$(git ls-remote --symref gitlab HEAD 2>/dev/null | head -n1 | awk '{print $2}' | sed 's@refs/heads/@@' || echo "")
          fi
          
          # Final fallback to 'main' if all else fails
          if [ -z "$GITLAB_DEFAULT_BRANCH" ]; then
            GITLAB_DEFAULT_BRANCH="main"
          fi
          
          echo "gitlab_branch=${GITLAB_DEFAULT_BRANCH}" >> $GITHUB_OUTPUT
          echo "GitLab default branch: ${GITLAB_DEFAULT_BRANCH}"
      
      - name: Sync default branch
        run: |
          GITLAB_BRANCH="${{ steps.detect-branch.outputs.gitlab_branch }}"
          
          # Validate branch name is not empty
          if [ -z "$GITLAB_BRANCH" ]; then
            echo "Error: Could not determine GitLab default branch"
            exit 1
          fi
          
          # Validate branch name contains only valid characters
          if ! echo "$GITLAB_BRANCH" | grep -qE '^[a-zA-Z0-9/_.-]+$'; then
            echo "Error: Invalid branch name detected: ${GITLAB_BRANCH}"
            exit 1
          fi
          
          # Get the current GitHub branch
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Current GitHub branch: ${CURRENT_BRANCH}"
          
          # Check if there are any changes to sync
          git fetch origin
          
          if git rev-parse gitlab/${GITLAB_BRANCH} >/dev/null 2>&1; then
            echo "Syncing from GitLab branch: ${GITLAB_BRANCH}"
            
            # Check if we're already up to date
            if git merge-base --is-ancestor gitlab/${GITLAB_BRANCH} HEAD; then
              echo "Already up to date with GitLab"
              exit 0
            fi
            
            # Attempt to merge changes
            if git merge gitlab/${GITLAB_BRANCH} -m "Sync from GitLab ${GITLAB_BRANCH} branch [skip ci]"; then
              echo "Successfully merged changes from GitLab"
            else
              # First merge failed; abort and retry with --allow-unrelated-histories
              # (needed when GitHub and GitLab repos were initialized with different root commits)
              git merge --abort 2>/dev/null || true
              if git merge gitlab/${GITLAB_BRANCH} --allow-unrelated-histories -m "Sync from GitLab ${GITLAB_BRANCH} branch (unrelated histories) [skip ci]"; then
                echo "Successfully merged changes from GitLab (unrelated histories)"
              else
                echo "Merge conflict detected. Manual intervention required."
                exit 1
              fi
            fi
          else
            echo "GitLab branch ${GITLAB_BRANCH} not found"
            exit 1
          fi
      
      - name: Push to GitHub
        run: |
          # Get the current branch name
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Pushing to GitHub branch: ${CURRENT_BRANCH}"
          
          # Verify we're on a valid branch (not detached HEAD)
          if [ "$CURRENT_BRANCH" = "HEAD" ]; then
            echo "Error: In detached HEAD state, cannot push"
            exit 1
          fi
          
          # Push to the current branch
          git push origin "${CURRENT_BRANCH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
